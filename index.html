<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe AI</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>NeuroToc<span> AI</span></h1>

    <!-- Controls -->
    <div class="controls">
      <div class="control-box">
        <label for="gameMode">Game Mode</label>
        <select id="gameMode">
          <option value="computer">Player vs Computer</option>
          <option value="twoplayer">Player vs Player</option>
        </select>
      </div>
      <div class="control-box">
        <label for="difficulty">Levels</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div class="control-box">
        <label for="playerSymbol">Play As</label>
        <select id="playerSymbol">
          <option value="X" selected>X</option>
          <option value="O">O</option>
        </select>
      </div>
    </div>

    <!-- Status -->
    <div id="status">
      Your Turn (X)
    </div>

    <!-- Game Board -->
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button id="restartBtn">
        Restart Game
      </button>
      <button id="newGameBtn"><span class="material-symbols-outlined"> +
        </span>
        New Game
      </button>
    </div>

    <!-- Score Board -->
    <div class="scoreboard">
      <div class="score">
        <h3 id="playerLabel">Player (X)</h3>
        <span id="playerScore">0</span>
      </div>
      <div class="score">
        <h3 id="computerLabel">Computer (O)</h3>
        <span id="computerScore">0</span>
      </div>
      <div class="score">
        <h3>Draw</h3>
        <span id="drawScore">0</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
